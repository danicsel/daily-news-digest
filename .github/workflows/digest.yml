name: news-digest
on:
  workflow_dispatch:
  repository_dispatch:
    types: [daily-digest]
permissions:
  contents: write      # needed to save each day's issue back to the repo
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install feedparser pyyaml anthropic
      - run: python digest.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Save today's issue to the repo
        run: |
          git config user.name "news-digest-bot"
          git config user.email "actions@github.com"
          git add issues/
          git diff --staged --quiet || (git commit -m "issue: $(date +%F)" && git push)
      - uses: actions/upload-pages-artifact@v3
        with: {path: _site}
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
